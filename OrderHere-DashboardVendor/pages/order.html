<style>
    body {
    background: #cccccc;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 1000px; 
    height: 100vh;
    margin: auto; 
    background: #fff;
    overflow: hidden;
    position: relative; /* WAJIB */
    display: flex;
  }
  
  .title {
    background: linear-gradient(90deg, #ffa83f 0%, #ff5e25 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 40px;
    font-weight: 700;
  }

  .subtitle {
    font-size: 24px;
    color: #333;
    margin-bottom: 20px;
  }

  /* FILTER */
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 25px;
  }

  .filters button {
    padding: 8px 14px;
    border: 1.5px solid #ff8a35;
    background: white;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
  }

  .filters button.active {
    background: linear-gradient(90deg, #ffa83f 0%, #ff5e25 100%);
    color: white;
    border: none;
  }

  /* ORDER WRAPPER */
  .order-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    max-width: 900px;
  }

  /* CARD */
  .card {
    background: white;
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
    border: 1px solid #eee;
    width: 100%;
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }

  /* HEADER */
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .badge {
    background: #3396ff;
    color: white;
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 13px;
  }

  .order-info {
    text-align: right;
  }

  .order-number {
    font-size: 20px;
    font-weight: bold;
    display: block;
  }

  .order-time {
    font-size: 13px;
    color: #888;
  }

  /* BODY */
  .location {
    font-size: 18px;
    font-weight: 700;
    margin: 10px 0;
  }

  .item-list {
    color: #666;
    font-size: 15px;
  }

  .item {
    display: flex;
    justify-content: space-between;
    margin: 3px 0;
  }

  /* DIVIDER */
  .divider {
    border-bottom: 2px dotted #ddd;
    margin: 15px 0;
  }

  /* TOTAL */
  .total-price {
    text-align: right;
    font-size: 18px;
    font-weight: bold;
  }

  /* BUTTON */
  .action-btn {
    margin-top: 10px;
    margin-left: auto;
    display: block;
    padding: 8px 18px;
    border: 1.5px solid #ffcc00;
    background: white;
    color: #ffb300;
    border-radius: 10px;
    cursor: pointer;
  }
</style>
<div class="title">Chick on Cup</div>
<div class="subtitle"><strong>Hey,</strong><br />what’s up?</div>

<div class="filters">
  <button class="active">Semua</button>
  <button>Pesanan Baru</button>
  <button>Sedang Dipersiapkan</button>
  <button>Diantar</button>
  <button>Selesai</button>
  <button>Dibatalkan</button>
</div>

<div class="order-container">
  <div class="card">
    <div class="card-header">
      <div class="badge">Pesanan Baru</div>
      <div class="order-info">
        <span class="order-number">#20</span>
        <span class="order-time">08.30</span>
      </div>
    </div>

    <div class="card-body">
      <h3 class="location">Lantai 5 Ruang 505 a/n Jonathan</h3>

      <div class="item-list">
        <div class="item">
          <span>Nasi Goreng</span>
          <span>x1</span>
        </div>
        <div class="item">
          <span>Mie Goreng</span>
          <span>x1</span>
        </div>
      </div>

      <div class="divider"></div>
      <div class="total-price">Rp 24.000</div>
    </div>

    <div class="card-footer">
      <button class="action-btn">Siapkan Pesanan</button>
    </div>
  </div>
</div>

<script data-init>
  function initOrderPage() {
    const filterButtons = document.querySelectorAll(".filters button");
    const cards = document.querySelectorAll(".card");

    filterButtons.forEach((button) => {
      button.onclick = function () {
        filterButtons.forEach((btn) => btn.classList.remove("active"));
        this.classList.add("active");

        const selected = this.innerText.toLowerCase();

        cards.forEach((card) => {
          const status = card.querySelector(".badge").innerText.toLowerCase();

          card.style.display =
            selected === "semua" || status === selected ? "block" : "none";
        });
      };
    });

    document.querySelectorAll(".action-btn").forEach((btn) => {
      btn.onclick = function () {
        const card = this.closest(".card");
        const badge = card.querySelector(".badge");

        const state = badge.innerText;

        if (state === "Pesanan Baru") {
          badge.innerText = "Sedang Dipersiapkan";
          badge.style.background = "#ffcc00";
          this.innerText = "Antar Pesanan";
        } else if (state === "Sedang Dipersiapkan") {
          badge.innerText = "Diantar";
          badge.style.background = "#ff8a35";
          this.innerText = "Selesaikan Pesanan";
        } else if (state === "Diantar") {
          badge.innerText = "Selesai";
          badge.style.background = "#28a745";
          this.style.display = "none";
        }
      };
    });
  }

  initOrderPage();
</script>
