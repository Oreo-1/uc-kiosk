<style>
  /* =========================
   GLOBAL RESET
========================= */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Montserrat", sans-serif;
  }

  body {
    background: #cccccc;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 1000px; 
    height: 100vh;
    margin: auto; 
    background: #fff;
    overflow: hidden;
    position: relative; 
    display: flex;
  }

  .header-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
  }

  .title {
    font-size: 40px;
    font-weight: 800;
    background: linear-gradient(90deg, #ffa83f, #ff5e25);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 22px;
    color: #333;
  }

  .subtitle strong {
    font-weight: 800;
    color: #000;
  }

  .add-btn {
    background: linear-gradient(90deg, #ffa83f, #ff5e25);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(255, 94, 37, 0.25);
    transition: 0.2s;
  }

  .add-btn:active {
    transform: scale(0.97);
  }

  /* =========================
   MENU CARD
========================= */
  .menu-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .menu-card {
    background: white;
    border-radius: 18px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
    border: 1px solid #eee;
    height: 140px;
    transition: 0.2s;
  }

  .menu-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }

  /* LEFT */
  .menu-left {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .menu-left img {
    width: 110px;
    height: 90px;
    object-fit: cover;
    border-radius: 12px;
  }

  .menu-name {
    font-size: 18px;
    font-weight: 700;
    color: #000;
  }

  .price {
    font-size: 15px;
    color: #666;
    margin-top: 4px;
  }

  /* RIGHT */
  .menu-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .action-icons {
    display: flex;
    gap: 10px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1.5px solid #ff5e25;
    background: white;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
  }

  .icon-btn:hover {
    background: #fff3ed;
  }

  .icon-btn.delete {
    border-color: #ff5e25;
  }

  /* =========================
   TOGGLE SWITCH
========================= */
  .switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 22px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #ccc;
    transition: 0.3s;
    border-radius: 20px;
  }

  .slider:before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .slider {
    background: linear-gradient(90deg, #ffa83f, #ff5e25);
  }

  input:checked + .slider:before {
    transform: translateX(18px);
  }

  .sheet-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    opacity: 0;
    pointer-events: none;
    transition: 0.25s;
    z-index: 100;
  }

  .sheet-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .bottom-sheet {
    position: absolute;
    bottom: 0px; 
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 1000px;
    max-height: 85%;
    background: #fff;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    transition: 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 101;
    display: flex;
    flex-direction: column;
  }

  .bottom-sheet.open {
   transform: translateX(-50%) translateY(0);
  }

  /* HANDLE */
  .sheet-handle {
    width: 50px;
    height: 5px;
    background: #ddd;
    border-radius: 10px;
    margin: 10px auto;
  }

  /* BODY */
  .sheet-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }

  .sheet-body h3 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 15px;
  }

  /* IMAGE */
  .sheet-img {
    width: 120px;
    height: 120px;
    border-radius: 12px;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin-bottom: 15px;
  }

  /* INPUT */
  .sheet-section {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
  }

  .sheet-section label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #666;
  }

  .sheet-section input {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
    background: #f9fafb;
  }

  .sheet-section input:focus {
    border-color: #ff5e25;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(255, 94, 37, 0.15);
  }

  /* FOOTER */
  .sheet-footer {
    padding: 15px 20px 20px;
  }

  .btn-tambah {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #ffa83f, #ff5e25);
    color: white;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255, 94, 37, 0.25);
    transition: 0.2s;
  }

  .btn-tambah:active {
    transform: scale(0.98);
  }
</style>
<div class="header-section">
  <div>
    <div class="title">Chick on Cup</div>
    <div class="subtitle"><strong>Menu</strong> Kamu</div>
  </div>
  <button class="add-btn">Tambah</button>
</div>

<div class="menu-container">
  <div class="card menu-card">
    <div class="menu-left">
      <img
        src="../images/assets/menu.png"
        class="preview-img"
        id="previewImg"
      />
      <div class="menu-info">
        <div class="menu-name">Nasi Goreng</div>
        <div class="price">Rp 20.000</div>
      </div>
    </div>

    <div class="menu-right">
      <div class="action-icons">
        <button class="icon-btn edit">✏️</button>
        <button class="icon-btn delete">🗑️</button>
      </div>
      <label class="switch">
        <input type="checkbox" checked />
        <span class="slider round"></span>
      </label>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET (UNIVERSAL) -->
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>

  <div class="sheet-body">
    <h3 id="sheet-title">Tambah Menu</h3>

    <div class="sheet-img" id="sheet-img">🍽️</div>

    <input type="hidden" id="edit-index" />

    <div class="sheet-section">
      <label>Nama Menu</label>
      <input type="text" id="sheet-name" />
    </div>

    <div class="sheet-section">
      <label>Harga</label>
      <input type="text" id="sheet-price-input" />
    </div>
  </div>

  <div class="sheet-footer">
    <button class="btn-tambah" onclick="saveMenu()">Simpan</button>
  </div>
</div>

<script>
  window.initMenuPage = function () {
    overlay = document.getElementById("sheet-overlay");

    const addBtn = document.querySelector(".add-btn");
    if (addBtn) addBtn.onclick = openTambah;

    document.querySelectorAll(".icon-btn.edit").forEach((btn) => {
      btn.onclick = () => openEdit(btn.closest(".menu-card"));
    });

    document.querySelectorAll(".icon-btn.delete").forEach((btn) => {
      btn.onclick = () => btn.closest(".menu-card")?.remove();
    });

    const el = document.getElementById("sheet-overlay");
    if (el) el.onclick = closeSheet;
  };

  /* =========================
   OPEN TAMBAH
========================= */
  function openTambah() {
    document.getElementById("sheet-title").innerText = "Tambah Menu";
    document.getElementById("sheet-name").value = "";
    document.getElementById("sheet-price-input").value = "";

    document.getElementById("bottom-sheet").classList.add("open");
    document.getElementById("sheet-overlay").classList.add("open");
  }

  /* =========================
   OPEN EDIT
========================= */
  function openEdit(card) {
    const nama = card.querySelector(".menu-name").innerText;
    const harga = card.querySelector(".price").innerText.replace("Rp ", "");

    document.getElementById("sheet-title").innerText = "Edit Menu";
    document.getElementById("sheet-name").value = nama;
    document.getElementById("sheet-price-input").value = harga;

    document.getElementById("bottom-sheet").classList.add("open");
    document.getElementById("sheet-overlay").classList.add("open");
  }

  /* =========================
   CLOSE SHEET
========================= */
  function closeSheet() {
    document.getElementById("bottom-sheet").classList.remove("open");
    document.getElementById("sheet-overlay").classList.remove("open");
  }

  /* =========================
   SAVE MENU
========================= */
  function saveMenu() {
    closeSheet();
  }
</script>
