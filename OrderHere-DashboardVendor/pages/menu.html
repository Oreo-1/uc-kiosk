<style>
  /* =========================
   GLOBAL RESET
========================= */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Montserrat", sans-serif;
  }

  body {
    background: #cccccc;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 1000px;
    height: 100vh;
    margin: auto;
    background: #fff;
    overflow: hidden;
    position: relative;
    display: flex;
  }

  .header-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
  }

  .title {
    font-size: 40px;
    font-weight: 800;
    background: linear-gradient(90deg, #ffa83f, #ff5e25);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 22px;
    color: #333;
  }

  .subtitle strong {
    font-weight: 800;
    color: #000;
  }

  .add-btn {
    background: linear-gradient(90deg, #ffa83f, #ff5e25);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(255, 94, 37, 0.25);
    transition: 0.2s;
  }

  .add-btn:active {
    transform: scale(0.97);
  }

  /* ROW */
  .sheet-img-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }

  /* PREVIEW */
  .sheet-img img {
    width: 160px;
    height: 110px;
    object-fit: cover;
    border-radius: 14px;
    border: 1px solid #eee;
  }

  /* UPLOAD BOX */
  .upload-box {
    flex: 1;
    border: 2px dashed #d1d5db;
    border-radius: 14px;
    background: #fafafa;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    padding: 10px;
  }

  .upload-box:hover {
    border-color: #ff5e25;
    background: #fff7f3;
  }

  /* CONTENT */
  .upload-content {
    text-align: center;
  }

  .upload-icon {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .upload-text {
    font-size: 13px;
    font-weight: 600;
    color: #333;
  }

  .upload-sub {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
  }

  /* =========================
   MENU CARD
========================= */
  .menu-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .menu-card {
    background: white;
    border-radius: 18px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
    border: 1px solid #eee;
    height: 140px;
    transition: 0.2s;
  }

  .menu-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }

  /* LEFT */
  .menu-left {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .menu-left img {
    width: 110px;
    height: 90px;
    object-fit: cover;
    border-radius: 12px;
  }

  .menu-name {
    font-size: 18px;
    font-weight: 700;
    color: #000;
  }

  .price {
    font-size: 15px;
    color: #666;
    margin-top: 4px;
  }

  /* RIGHT */
  .menu-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .action-icons {
    display: flex;
    gap: 10px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1.5px solid #ff5e25;
    background: white;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
  }

  .icon-btn:hover {
    background: #fff3ed;
  }

  .icon-btn.delete {
    border-color: #ff5e25;
  }

  /* =========================
   TOGGLE SWITCH
========================= */
  .switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 22px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #ccc;
    transition: 0.3s;
    border-radius: 20px;
  }

  .slider:before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .slider {
    background: linear-gradient(90deg, #ffa83f, #ff5e25);
  }

  input:checked + .slider:before {
    transform: translateX(18px);
  }

  .btn-tambah:active {
    transform: scale(0.98);
  }

  /* =========================
   BOTTOM SHEET MODERN
========================= */
  .bottom-sheet {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 1000px;
    height: 95%;
    background: #f9fafb;
    border-radius: 26px 26px 0 0;
    box-shadow: 0 -15px 50px rgba(0, 0, 0, 0.2);
    transition: 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
    z-index: 200;
  }

  .bottom-sheet.open {
    transform: translateX(-50%) translateY(0);
  }

  /* HANDLE */
  .sheet-handle {
    width: 60px;
    height: 6px;
    background: #d1d5db;
    border-radius: 20px;
    margin: 12px auto;
  }

  /* BODY */

  .sheet-body {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }

  .sheet-body h3 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 20px;
  }

  /* IMAGE */
  .sheet-img img {
    width: 160px;
    height: 110px;
    object-fit: cover;
    border-radius: 14px;
  }

  /* INPUT */
  .sheet-section {
    margin-bottom: 16px;
  }

  .sheet-section label {
    font-size: 14px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 6px;
    display: block;
  }

  .input-modern {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    background: #fff;
    font-size: 15px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
  }

  .input-modern:focus {
    outline: none;
    border-color: #ff5e25;
    box-shadow: 0 0 0 3px rgba(255, 94, 37, 0.15);
  }

  /* ROW */
  .row {
    display: flex;
    gap: 12px;
  }

  /* PRICE GROUP */
  .price-group {
    display: flex;
    align-items: center;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    background: #fff;
  }

  .price-prefix {
    padding: 14px;
    background: #f3f4f6;
    font-weight: 600;
  }

  .price-group input {
    border: none;
    padding: 14px;
    flex: 1;
    font-size: 15px;
  }

  /* SELECT */
  select.input-modern {
    appearance: none;
  }

  /* TASTE BUTTONS */
  .taste-row {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }

  .taste-box {
    background: #fff;
    border-radius: 14px;
    padding: 10px;
    width: 80px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
    border: 1px solid #eee;
  }

  .taste-box span {
    font-size: 12px;
    color: #777;
    display: block;
    margin-bottom: 4px;
  }

  .taste-box strong {
    font-size: 16px;
  }

  /* =========================
   MENU TAMBAHAN
========================= */
  .extra-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
  }

  .extra-header h4 {
    font-size: 16px;
    font-weight: 700;
  }

  .extra-actions {
    display: flex;
    gap: 8px;
  }

  .icon-orange {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 2px solid #ff5e25;
    background: white;
    color: #ff5e25;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
  }

  .icon-orange:hover {
    background: #fff3ed;
  }

  /* FORM EXTRA */
  .extra-form {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }

  .extra-form .sheet-section {
    flex: 1;
  }

  /* NOTE */
  .extra-note {
    font-size: 13px;
    color: #777;
    margin-top: 6px;
  }

  /* BUTTON */
  .btn-save {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-size: 16px;
    font-weight: 800;
    color: white;
    background: linear-gradient(90deg, #ffa83f, #ff5e25);
    box-shadow: 0 10px 25px rgba(255, 94, 37, 0.3);
    cursor: pointer;
  }

  .btn-save:active {
    transform: scale(0.97);
  }

  .btn-tambah:hover {
    opacity: 0.95;
  }

  /* =========================
   OVERLAY
========================= */
  .sheet-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    opacity: 0;
    pointer-events: none;
    transition: 0.25s;
    z-index: 100;
  }

  .sheet-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
</style>

<div class="header-section">
  <div>
    <div class="title">Chick on Cup</div>
    <div class="subtitle"><strong>Menu</strong> Kamu</div>
  </div>
  <button class="add-btn">Tambah</button>
</div>

<div class="menu-container">
  <div class="card menu-card">
    <div class="menu-left">
      <img src="images/assets/menu.png" class="preview-img" id="previewImg" />
      <div class="menu-info">
        <div class="menu-name">Nasi Goreng</div>
        <div class="price">Rp 20.000</div>
      </div>
    </div>

    <div class="menu-right">
      <div class="action-icons">
        <button class="icon-btn edit">✏️</button>
        <button class="icon-btn delete">🗑️</button>
      </div>
      <label class="switch">
        <input type="checkbox" checked />
        <span class="slider round"></span>
      </label>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET (UNIVERSAL) -->
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>

  <div class="sheet-body">
    <h3 id="sheet-title">Edit Menu</h3>

    <!-- IMAGE -->
    <div class="sheet-img-row">
      <!-- PREVIEW -->
      <div class="sheet-img">
        <img id="preview-image" src="images\assets\menu.png" />
      </div>

      <!-- UPLOAD BOX -->
      <label class="upload-box">
        <input type="file" id="image-input" accept="image/*" hidden />

        <div class="upload-content">
          <div class="upload-icon">⬆</div>
          <div class="upload-text">Choose a file or drag & drop it here</div>
          <div class="upload-sub">JPEG, PNG, PDF, up to 50 MB</div>
        </div>
      </label>
    </div>

    <!-- NAMA -->
    <div class="sheet-section">
      <label>Nama</label>
      <input type="text" id="sheet-name" class="input-modern" />
    </div>

    <!-- HARGA + KATEGORI -->
    <div class="row">
      <div class="sheet-section" style="flex: 1">
        <label>Harga</label>
        <div class="price-group">
          <div class="price-prefix">Rp</div>
          <input type="text" id="sheet-price-input" />
        </div>
      </div>

      <div class="sheet-section" style="flex: 1">
        <label>Kategori</label>
        <select class="input-modern">
          <option>Makanan</option>
          <option>Minuman</option>
        </select>
      </div>
    </div>

    <!-- TASTE -->
    <div class="taste-row">
      <div class="taste-box"><span>Manis</span><strong>1</strong></div>
      <div class="taste-box"><span>Pahit</span><strong>5</strong></div>
      <div class="taste-box"><span>Asin</span><strong>5</strong></div>
      <div class="taste-box"><span>Asam</span><strong>5</strong></div>
      <div class="taste-box"><span>Pedas</span><strong>5</strong></div>
    </div>

    <!-- MENU TAMBAHAN -->
    <div class="extra-header">
      <h4>Menu Tambahan</h4>
      <div class="extra-actions">
        <button class="icon-orange">🗑️</button>
        <button class="icon-orange">＋</button>
      </div>
    </div>

    <div class="extra-form">
      <!-- NAMA -->
      <div class="sheet-section">
        <label>Nama</label>
        <select class="input-modern">
          <option>Telur</option>
          <option>Keju</option>
          <option>Ayam</option>
        </select>
      </div>

      <!-- HARGA -->
      <div class="sheet-section">
        <label>Harga</label>
        <div class="price-group">
          <div class="price-prefix">Rp</div>
          <input type="text" value="75.000" />
        </div>
      </div>
    </div>

    <div class="extra-note">Telur (Rp3.000)</div>
  </div>

  <div style="padding: 20px">
    <button class="btn-save" onclick="saveMenu()">Simpan</button>
  </div>
</div>

<script>
const extraPrices = {
  Telur: 3000,
  Keju: 5000,
  Ayam: 8000,
};

  window.initMenuPage = function () {
    overlay = document.getElementById("sheet-overlay");

    const addBtn = document.querySelector(".add-btn");
    if (addBtn) addBtn.onclick = openTambah;

    document.querySelectorAll(".icon-btn.edit").forEach((btn) => {
      btn.onclick = () => openEdit(btn.closest(".menu-card"));
    });

    document.querySelectorAll(".icon-btn.delete").forEach((btn) => {
      btn.onclick = () => btn.closest(".menu-card")?.remove();
    });

    const el = document.getElementById("sheet-overlay");
    if (el) el.onclick = closeSheet;
  };

  bindExtraListener();

  function bindExtraListener() {
  const select = document.querySelector(".extra-form select");
  if (!select) return;

  select.onchange = function () {
    updateExtraNote(this.value);
  };
}

function updateExtraNote(value) {
  const note = document.querySelector(".extra-note");

  if (!value || !extraPrices[value]) {
    note.innerText = "";
    return;
  }

  const harga = extraPrices[value].toLocaleString("id-ID");

  note.innerText = `${value} (Rp${harga})`;
}
  
  function openTambah() {
    mode = "add";
    currentCard = null;

    document.getElementById("sheet-title").innerText = "Tambah Menu";

    // RESET INPUT
    document.getElementById("sheet-name").value = "";
    document.getElementById("sheet-price-input").value = "";

    // RESET SELECT (kategori)
    document.querySelector("select.input-modern").selectedIndex = 0;

    // RESET IMAGE
    document.getElementById("preview-image").src = "";
    document.getElementById("image-input").value = "";

    // RESET TASTE
    document.querySelectorAll(".taste-box strong").forEach((el) => {
      el.innerText = "0";
    });

    // RESET EXTRA
    document.querySelector(".extra-form").innerHTML = `
    <div class="sheet-section">
      <label>Nama</label>
      <select class="input-modern">
        <option value="">Pilih tambahan</option>
        <option>Telur</option>
        <option>Keju</option>
        <option>Ayam</option>
      </select>
    </div>

    <div class="sheet-section">
      <label>Harga</label>
      <div class="price-group">
        <div class="price-prefix">Rp</div>
        <input type="text" placeholder="0" />
      </div>
    </div>
  `;

    document.querySelector(".extra-note").innerText = "";

    openSheet();
  }

  bindExtraListener();
  
  /* =========================
   OPEN EDIT
========================= */
  function openEdit(card) {
    mode = "edit";
    currentCard = card;

    const nama = card.querySelector(".menu-name").innerText;
    const harga = card.querySelector(".price").innerText.replace("Rp ", "");
    const img = card.querySelector("img").src;

    document.getElementById("sheet-title").innerText = "Edit Menu";
    document.getElementById("sheet-name").value = nama;
    document.getElementById("sheet-price-input").value = harga;
    document.getElementById("preview-image").src = img;

    openSheet();
  }

  function openSheet() {
    document.getElementById("bottom-sheet").classList.add("open");
    document.getElementById("sheet-overlay").classList.add("open");
  }

  /* =========================
   CLOSE SHEET
========================= */
  function closeSheet() {
    document.getElementById("bottom-sheet").classList.remove("open");
    document.getElementById("sheet-overlay").classList.remove("open");
  }

  const input = document.getElementById("image-input");
  const preview = document.getElementById("preview-image");

  if (input) {
    input.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  /* =========================
   SAVE MENU
========================= */
  function saveMenu() {
    const nama = document.getElementById("sheet-name").value;
    const harga = document.getElementById("sheet-price-input").value;
    const img = document.getElementById("preview-image").src;

    if (!nama || !harga) {
      alert("Nama & harga wajib diisi!");
      return;
    }

    if (mode === "add") {
      // BUAT CARD BARU
      const container = document.querySelector(".menu-container");

      const newCard = document.createElement("div");
      newCard.className = "card menu-card";

      newCard.innerHTML = `
      <div class="menu-left">
        <img src="${img}" />
        <div class="menu-info">
          <div class="menu-name">${nama}</div>
          <div class="price">Rp ${harga}</div>
        </div>
      </div>

      <div class="menu-right">
        <div class="action-icons">
          <button class="icon-btn edit">✏️</button>
          <button class="icon-btn delete">🗑️</button>
        </div>
        <label class="switch">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
      </div>
    `;

      container.appendChild(newCard);

      // rebind event
      newCard.querySelector(".edit").onclick = () => openEdit(newCard);
      newCard.querySelector(".delete").onclick = () => newCard.remove();
    } else if (mode === "edit" && currentCard) {
      // UPDATE CARD
      currentCard.querySelector(".menu-name").innerText = nama;
      currentCard.querySelector(".price").innerText = `Rp ${harga}`;
      currentCard.querySelector("img").src = img;
    }

    closeSheet();
  }
</script>
