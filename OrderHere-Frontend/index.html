<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat';
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .kiosk-wrapper {
      width: 500px;
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      padding: 48px 24px 32px;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
    }

    .header .label {
      font-size: 23px;
      letter-spacing: 0.04em;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.15;
    }

    .header h1 span {
      font-weight: 400;
      color: #1a1a1a;
    }

    /* Option Cards */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      flex: 1;
      align-content: center;
    }

    .option-card {
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 42px 16px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
      background: #ffffff;
      user-select: none;
    }

    .option-card:hover {
      border-color: #f97316;
      box-shadow: 0 4px 16px rgba(249, 115, 22, 0.12);
    }

    .option-card.selected {
      border-color: #f97316;
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.2);
    }

    .option-card:active {
      transform: scale(0.97);
    }

    .card-icon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon img {
      width: 100px;
      object-fit: contain;
    }

    .card-label {
      font-size: 14px;
      font-weight: 600;
      color: #f97316;
      text-align: center;
      line-height: 1.3;
    }

    /* CTA Button */
    .cta {
      margin-top: 48px;
    }

    .btn-pilih {
      width: 83%;
      margin: 20px auto;
      display: block;
      padding: 18px;
      border: none;
      border-radius: 10px;
      background: var(--primary-gradient);
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-pilih:hover {
      opacity: 0.92;
    }

    .btn-pilih:active {
      transform: scale(0.98);
    }

    .btn-pilih:disabled {
      background: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
    }
  </style>
  <link rel="stylesheet" href="main.css" />
</head>

<body>
  <div class="kiosk-wrapper">

    <!-- Header -->
    <div class="header">
      <p class="label text-primary poppins-bold">Order Here</p>
      <h1>Hey,<br><span>what's up?</span></h1>
    </div>

    <!-- Option Cards -->
    <div class="options">

      <div class="option-card" id="card-dine" onclick="selectOption(this, 'makan di kantin')">
        <div class="card-icon">
          <img src="assets/dining-options/dinein.svg">
        </div>
        <span class="card-label">Makan Di<br>Kantin</span>
      </div>

      <div class="option-card" id="card-takeaway" onclick="selectOption(this, 'takeaway')">
        <div class="card-icon">
          <img src="assets/dining-options/takeaway.svg">
        </div>
        <span class="card-label">Takeaway</span>
      </div>

    </div>

    <!-- CTA -->
    <div class="cta">
      <button class="btn-pilih" id="btn-pilih" disabled onclick="handlePilih()">
        Pilih
      </button>
    </div>

  </div>

  <script>
    let selected = null;

    function selectOption(el, type) {
  selected = type;
  document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('btn-pilih').disabled = false;
}

  function handlePilih() {
    if (!selected) return;
    window.location.href = 'order.html?type=' + encodeURIComponent(selected);
  }

  // inactivity to ad page
  let timeout;

  function resetTimer() {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      window.location.href = "adv1.html";
    }, 15000); // 15 seconds (nnti lebih lama)
  }

  // Detect user activity
  ["click", "mousemove", "keydown", "touchstart"].forEach(event => {
    document.addEventListener(event, resetTimer);
  });

  // Start timer on load
  resetTimer();

  // remove orderType when this html
  localStorage.removeItem("orderType");
  </script>
</body>

</html>
